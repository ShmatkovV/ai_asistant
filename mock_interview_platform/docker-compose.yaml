services:
  postgres:
    image: postgres:latest
    container_name: postgres1_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - postgres_network
  
volumes:
  postgres_data:


networks:
  postgres_network: